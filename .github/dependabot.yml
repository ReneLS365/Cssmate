version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-tooling:
        applies-to: version-updates
        patterns:
          - "@playwright/*"
          - "@size-limit/*"
          - "express"
          - "html-validate"
          - "http-server"
          - "jszip"
          - "lighthouse"
          - "linkinator"
          - "partykit"
          - "pdf-lib"
          - "size-limit"
          - "terser"

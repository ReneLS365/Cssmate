name: e2e

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VITE_E2E_BYPASS_AUTH: '1'
      VITE_E2E_DISABLE_NUMPAD: '1'
      VITE_AUTH0_DOMAIN: 'example.invalid'
      VITE_AUTH0_CLIENT_ID: 'example'
      VITE_AUTH0_AUDIENCE: 'https://api.example.invalid'
      VITE_AUTH0_REDIRECT_URI: 'http://127.0.0.1:4173/'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke build (function import checks)
        run: npm run smoke:build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Netlify E2E server
        run: |
          npm run e2e:serve > preview.log 2>&1 &
          echo $! > preview.pid
        env:
          PORT: 4173
          CSSMATE_IS_CI: '1'

      - name: Wait for server
        run: npx wait-on --timeout 120000 http://127.0.0.1:4173

      - name: Run Playwright tests
        env:
          E2E_BASE_URL: http://127.0.0.1:4173
          PLAYWRIGHT_SKIP_WEBSERVER: '1'
          CI: '1'
        run: npm run test:e2e

      - name: Dump preview log on failure
        if: failure()
        run: |
          echo "=== preview.log ==="
          cat preview.log || true
          echo "=== preview pid ==="
          cat preview.pid || true
          echo "=== process ==="
          ps -p "$(cat preview.pid)" || true

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
            preview.log
